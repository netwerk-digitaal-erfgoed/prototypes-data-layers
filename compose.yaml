services:
  node:
    image: node:lts
    user: node
    volumes:
      - .:/app
    working_dir: /app
    command: bash
    network_mode: host

  valeros-typesense:
    image: typesense/typesense:30.1
    container_name: valeros-typesense
    restart: on-failure
    environment:
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY}
    ports:
      - 8108:8108
    volumes:
      - valeros-typesense-data:/data
    command: "--data-dir /data"

  valeros-api:
    image: node:lts
    container_name: valeros-api
    env_file: .env
    user: node
    volumes:
      - .:/app
    ports:
      - 3000:3000
    working_dir: /app
    command: npx turbo run start --filter=@repo/valeros-api
    depends_on:
      - valeros-typesense

volumes:
  valeros-typesense-data:
